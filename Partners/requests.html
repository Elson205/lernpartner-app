<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Partneranfragen - BUW</title>

    <link rel="stylesheet" href="requests.css" />
  </head>

  <body>
    <header>
      <div class="logo">BUW</div>

      <nav class="top-nav">
        <button type="button" id="profileBtn" class="nav-btn">
          <span class="nav-icon">👤</span>
          <span class="nav-text">Profil</span>
        </button>

        <button type="button" id="coursesBtn" class="nav-btn">
          <span class="nav-icon">📚</span>
          <span class="nav-text">Kurse</span>
        </button>

        <button type="button" id="partnersBtn" class="nav-btn">
          <span class="nav-icon">🔍</span>
          <span class="nav-text">Partner</span>
        </button>

        <button type="button" id="requestsBtn" class="nav-btn active">
          <span class="nav-icon">🤝</span>
          <span class="nav-text">Anfragen</span>
        </button>

        <button type="button" id="chatBtn" class="nav-btn">
          <span class="nav-icon">💬</span>
          <span class="nav-text">Chat</span>
        </button>

        <button type="button" id="logoutBtn" class="nav-btn logout">
          <span class="nav-icon">🚪</span>
          <span class="nav-text">Abmelden</span>
        </button>
      </nav>
    </header>

    <main class="requests-page">
      <section class="requests-section">
        <h1>Partneranfragen</h1>

        <p class="intro-text">
          Hier kannst du erhaltene Anfragen annehmen oder ablehnen und deine
          gesendeten Anfragen verfolgen.
        </p>
      </section>

      <section class="requests-section">
        <h2>Erhaltene Anfragen</h2>

        <div id="receivedRequestsList" class="requests-list">
          <p class="empty-message">Keine erhaltenen Anfragen.</p>
        </div>
      </section>

      <section class="requests-section">
        <h2>Gesendete Anfragen</h2>

        <div id="sentRequestsList" class="requests-list">
          <p class="empty-message">Keine gesendeten Anfragen.</p>
        </div>
      </section>
    </main>

    <!-- =========================
         MODIFICATION: Ajout de la modal personnalisée pour remplacer les alert()
         Cette modal affichera les messages d’information, de succès, d’erreur ou d’avertissement.
         Elle sera utilisée dans requests.js avec showModal().
    ========================= -->
    <div id="customModal" class="custom-modal hidden">
      <div class="modal-backdrop"></div>

      <div class="modal-box">
        <div id="modalIcon" class="modal-icon">ℹ️</div>

        <h2 id="modalTitle">Hinweis</h2>

        <p id="modalMessage">Nachricht...</p>

        <button type="button" id="modalCloseBtn">OK</button>
      </div>
    </div>

    <script type="module" src="requests.js"></script>
  </body>
</html>
