<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Lernpartner finden - BUW</title>

    <link rel="stylesheet" href="partners.css" />
  </head>

  <body>
    <header>
      <div class="logo">BUW</div>

      <nav class="top-nav">
        <button type="button" id="profileBtn" class="nav-btn">
          <span class="nav-icon">👤</span>
          <span class="nav-text">Profil</span>
        </button>

        <button type="button" id="coursesBtn" class="nav-btn">
          <span class="nav-icon">📚</span>
          <span class="nav-text">Kurse</span>
        </button>

        <button type="button" id="partnersBtn" class="nav-btn active">
          <span class="nav-icon">🔍</span>
          <span class="nav-text">Partner</span>
        </button>

        <!-- Modification : ajout du badge rouge pour les notifications de demandes -->
        <button type="button" id="requestsBtn" class="nav-btn">
          <span class="nav-icon">🤝</span>
          <span class="nav-text">Anfragen</span>
          <span id="requestsBadge" class="nav-badge hidden">0</span>
        </button>

        <!-- Modification : ajout du badge rouge pour les nouveaux messages -->
        <button type="button" id="chatBtn" class="nav-btn">
          <span class="nav-icon">💬</span>
          <span class="nav-text">Chat</span>
          <span id="chatBadge" class="nav-badge hidden">0</span>
        </button>

        <button type="button" id="logoutBtn" class="nav-btn logout">
          <span class="nav-icon">🚪</span>
          <span class="nav-text">Abmelden</span>
        </button>
      </nav>
    </header>

    <main class="partners-page">
      <section class="search-section">
        <h1>Lernpartner finden</h1>

        <p class="intro-text">
          Finde Studierende, die ähnliche Kurse belegen oder zu deinem
          Studienbereich passen.
        </p>

        <form id="partnerSearchForm" class="partner-search-form">
          <input
            type="text"
            id="partnerSearchInput"
            placeholder="Suche nach Kurs oder Modul, z.B. Statistik 2"
            autocomplete="off"
          />

          <button type="submit" class="search-btn">Suche</button>
        </form>
      </section>

      <hr />

      <section class="results-layout">
        <div id="partnersList" class="partners-list">
          <p class="empty-message">
            Suche nach einem Kurs oder wähle einen Vorschlag aus.
          </p>
        </div>

        <aside class="suggestions-box">
          <h3>Vorschläge basierend auf deinen Kursen</h3>

          <div id="suggestionsList">
            <p class="empty-message">
              Deine Kursvorschläge werden hier angezeigt.
            </p>
          </div>
        </aside>
      </section>
    </main>

    <!-- Custom Modal statt alert() -->
    <div id="customModal" class="custom-modal hidden">
      <div class="modal-backdrop"></div>

      <div class="modal-box">
        <div id="modalIcon" class="modal-icon">ℹ️</div>

        <h2 id="modalTitle">Hinweis</h2>

        <p id="modalMessage">Nachricht...</p>

        <button type="button" id="modalCloseBtn">OK</button>
      </div>
    </div>

    <script type="module" src="partners.js"></script>
  </body>
</html>
