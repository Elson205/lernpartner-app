<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lernpartner Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Finde deinen Lernpartner</h1>

  <form id="profileForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="subject" placeholder="Fach" required>
    <input type="text" id="semester" placeholder="Semester">
    <input type="text" id="language" placeholder="Sprache">
    <input type="text" id="contact" placeholder="Kontakt (WhatsApp oder email)" required>
    <button type="submit">Veröffentlichen</button>
  </form>

  <h2>Verfügbare Studierende</h2>
  <div id="list"></div>

  <script src="app.js"></script>

</body>
</html>
