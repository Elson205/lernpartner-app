<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chat - BUW</title>

    <link rel="stylesheet" href="chat.css" />
  </head>

  <body>
    <header>
      <div class="logo">BUW</div>

      <nav class="top-nav">
        <button type="button" id="profileBtn" class="nav-btn">
          <span class="nav-icon">👤</span>
          <span class="nav-text">Profil</span>
        </button>

        <button type="button" id="coursesBtn" class="nav-btn">
          <span class="nav-icon">📚</span>
          <span class="nav-text">Kurse</span>
        </button>

        <button type="button" id="partnersBtn" class="nav-btn">
          <span class="nav-icon">🔍</span>
          <span class="nav-text">Partner</span>
        </button>

        <!-- Modification : ajout du badge rouge pour les notifications de demandes -->
        <button type="button" id="requestsBtn" class="nav-btn">
          <span class="nav-icon">🤝</span>
          <span class="nav-text">Anfragen</span>
          <span id="requestsBadge" class="nav-badge hidden">0</span>
        </button>

        <!-- Modification : badge utile pour les messages non lus dans les autres conversations -->
        <button type="button" id="chatBtn" class="nav-btn active">
          <span class="nav-icon">💬</span>
          <span class="nav-text">Chat</span>
          <span id="chatBadge" class="nav-badge hidden">0</span>
        </button>

        <button type="button" id="logoutBtn" class="nav-btn logout">
          <span class="nav-icon">🚪</span>
          <span class="nav-text">Abmelden</span>
        </button>
      </nav>
    </header>

    <main class="chat-page" id="chatPage">
      <aside class="contacts-panel">
        <div class="contact-search-row">
          <div class="contact-search">
            <span class="search-icon">⌕</span>

            <input
              type="text"
              id="contactSearchInput"
              placeholder="Kontakt suchen"
              autocomplete="off"
            />
          </div>
        </div>

        <div id="contactsList" class="contacts-list">
          <p class="empty-message contacts-empty">Keine Kontakte gefunden.</p>
        </div>
      </aside>

      <section class="chat-panel">
        <div class="chat-header">
          <button id="backToContactsBtn" class="back-btn">‹</button>

          <div>
            <h1 id="chatPartnerName">Chat auswählen</h1>
            <p id="chatPartnerStatus" class="chat-status">-</p>
          </div>

          <div class="active-indicator">
            <span id="activeDot" class="active-dot offline"></span>
            <span id="activeText">Offline</span>
          </div>
        </div>

        <div id="messagesList" class="messages-list">
          <p class="empty-message">Wähle einen Kontakt aus.</p>
        </div>

        <!-- Modification : message permanent affiché quand la Lernpartnerschaft est terminée -->
        <div id="endedChatNotice" class="ended-chat-notice hidden">
          Diese Lernpartnerschaft wurde beendet.
        </div>

        <form id="messageForm" class="message-form">
          <label for="fileInput" class="attach-btn" title="Datei anhängen">
            📎
          </label>

          <input
            type="file"
            id="fileInput"
            class="file-input"
            accept=".pdf,.doc,.docx,.xls,.xlsx,image/*,audio/*,video/*"
          />

          <!-- Modification : remplacement de input par 
            pour permettre les messages longs sur plusieurs lignes -->
          <textarea
            id="messageInput"
            placeholder="Textnachricht senden..."
            autocomplete="off"
            rows="1"
          ></textarea>

          <!-- Modification : ajout d'un id au bouton d'envoi pour pouvoir le désactiver depuis chat.js -->
          <button type="submit" id="sendMessageBtn" class="send-btn">
            Senden
          </button>
        </form>

        <p id="filePreview" class="file-preview"></p>
      </section>

      <aside class="profile-panel">
        <img
          id="profilePhoto"
          class="profile-photo"
          src="../user-placeholder.jpg"
          alt="Profilbild"
        />

        <h2 id="profileName">-</h2>

        <div class="profile-info">
          <p><strong>Fakultät:</strong> <span id="profileFaculty">-</span></p>

          <p>
            <strong>Fachbereich:</strong>
            <span id="profileFachbereich">-</span>
          </p>

          <p><strong>Semester:</strong> <span id="profileSemester">-</span></p>

          <p>
            <strong>Nationalität:</strong>
            <span id="profileNationality">-</span>
          </p>

          <p>
            <strong>Zuletzt online:</strong>
            <span id="profileLastSeen">-</span>
          </p>
        </div>

        <hr />

        <div class="request-status-box">
          <h3>Status:</h3>

          <div id="requestStatus" class="request-status confirmed">
            Lernpartnerschaft bestätigt
          </div>
        </div>
      </aside>
    </main>

    <!-- Modification : modal personnalisée pour remplacer les alert() dans la page Chat -->
    <div id="customModal" class="custom-modal hidden">
      <div class="modal-backdrop"></div>

      <div class="modal-box">
        <div id="modalIcon" class="modal-icon">ℹ️</div>

        <h2 id="modalTitle">Hinweis</h2>

        <p id="modalMessage">Nachricht...</p>

        <button type="button" id="modalCloseBtn">OK</button>
      </div>
    </div>

    <div id="photoModal" class="photo-modal">
      <div class="photo-modal-content">
        <button id="closePhotoModal" class="close-photo-modal">×</button>

        <h2 id="photoModalName">Profilbild</h2>

        <img
          id="photoModalImage"
          src="../user-placeholder.jpg"
          alt="Profilbild groß"
          class="photo-modal-image"
        />
      </div>
    </div>

    <script type="module" src="chat.js"></script>
  </body>
</html>
