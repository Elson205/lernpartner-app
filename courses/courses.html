<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kursverwaltung - BUW</title>

    <link rel="stylesheet" href="courses.css" />
  </head>

  <body>
    <header>
      <div class="logo">BUW</div>

      <div class="header-actions">
        <button type="button" id="partnersBtn" class="header-btn">
          Lernpartner finden
        </button>

        <button type="button" id="chatBtn" class="header-btn">
          Chat
        </button>

        <button type="button" id="logoutBtn" class="login-btn">
          Abmelden
        </button>
      </div>
    </header>

    <main class="courses-page">
      <section class="my-courses">
        <h2>Meine Kurse</h2>

        <div class="search-bar">
          <input
            type="text"
            id="searchInput"
            placeholder="Suche nach Kursname, Semester oder Fakultät..."
            aria-label="Kurs suchen"
          />
        </div>

        <div id="courseList" class="course-container">
          <p class="empty-message">Keine Kurse hinzugefügt.</p>
        </div>
      </section>

      <hr />

      <section class="add-course">
        <h2>Neuen Kurs hinzufügen</h2>

        <form id="addCourseForm">
          <label for="courseName">Kursname</label>
          <input
            type="text"
            id="courseName"
            name="courseName"
            placeholder="z.B. Mathematik A"
            required
          />

          <label for="semester">Semester</label>
          <select id="semester" name="semester" required>
            <option value="">Wählen...</option>
            <option value="1. - 2. Semester">1. - 2. Semester</option>
            <option value="3. - 4. Semester">3. - 4. Semester</option>
            <option value="5. - 6. Semester">5. - 6. Semester</option>
            <option value="7. Semester oder höher">
              7. Semester oder höher
            </option>
          </select>

          <label for="faculty">Faculty</label>
          <select id="faculty" name="faculty" required>
            <option value="">Bitte Fakultät auswählen</option>
            <option value="Geistes- und Kulturwissenschaften">
              Geistes- und Kulturwissenschaften
            </option>
            <option value="Human- und Sozialwissenschaften">
              Human- und Sozialwissenschaften
            </option>
            <option
              value="Wirtschaftswissenschaft - Schumpeter School of Business and Economics"
            >
              Wirtschaftswissenschaft - Schumpeter School of Business and
              Economics
            </option>
            <option value="Mathematik und Naturwissenschaften">
              Mathematik und Naturwissenschaften
            </option>
            <option value="Architektur und Bauingenieurwesen">
              Architektur und Bauingenieurwesen
            </option>
            <option
              value="Elektrotechnik, Informationstechnik und Medientechnik"
            >
              Elektrotechnik, Informationstechnik und Medientechnik
            </option>
            <option value="Maschinenbau und Sicherheitstechnik">
              Maschinenbau und Sicherheitstechnik
            </option>
            <option value="Design und Kunst">Design und Kunst</option>
            <option value="School of Education">School of Education</option>
          </select>

          <button type="submit" class="add-btn" id="addCourseBtn">
            Kurs hinzufügen
          </button>
        </form>
      </section>
    </main>

    <script type="module" src="courses.js"></script>
  </body>
</html>
