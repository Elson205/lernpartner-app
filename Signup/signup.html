<!doctype html>
<html lang="de">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Registrierung - BUW</title>

    <link rel="stylesheet" href="signup.css" />
  </head>

  <body>
    <header>
      <div class="logo">BUW</div>

      <button
        type="button"
        class="login-btn"
        onclick="window.location.href = '../Login/login.html'"
      >
        Anmelden
      </button>
    </header>

    <main class="registration">
      <section class="form-section">
        <h1>Registrierung</h1>

        <form id="registrationForm">
          <div class="top-profile-section">
            <div class="profile-picture">
              <label for="uploadPhoto" class="photo-label">
                Profile Picture
              </label>

              <img
                id="profilePreview"
                src="user-placeholder.jpg"
                alt="Profile Picture"
              />

              <label for="uploadPhoto" class="custom-upload">
                Upload Photo
              </label>

              <input type="file" id="uploadPhoto" accept="image/*" />
            </div>

            <div class="user-info">
              <label for="fullname">Full Name</label>
              <input
                type="text"
                id="fullname"
                name="fullname"
                placeholder="Vor- Nachname"
              />

              <label for="email">University Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="beispiel@uni-wuppertal.de"
              />

              <label for="password">Passwort</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Mindestens 6 Zeichen"
              />

              <label for="confirmPassword">Passwort bestätigen</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Passwort erneut eingeben"
              />
            </div>
          </div>

          <label for="faculty">Faculty</label>
          <select id="faculty" name="faculty">
            <option value="">Bitte Fakultät auswählen</option>
            <option value="Geistes- und Kulturwissenschaften">
              Geistes- und Kulturwissenschaften
            </option>
            <option value="Human- und Sozialwissenschaften">
              Human- und Sozialwissenschaften
            </option>
            <option
              value="Wirtschaftswissenschaft - Schumpeter School of Business and Economics"
            >
              Wirtschaftswissenschaft - Schumpeter School of Business and
              Economics
            </option>
            <option value="Mathematik und Naturwissenschaften">
              Mathematik und Naturwissenschaften
            </option>
            <option value="Architektur und Bauingenieurwesen">
              Architektur und Bauingenieurwesen
            </option>
            <option
              value="Elektrotechnik, Informationstechnik und Medientechnik"
            >
              Elektrotechnik, Informationstechnik und Medientechnik
            </option>
            <option value="Maschinenbau und Sicherheitstechnik">
              Maschinenbau und Sicherheitstechnik
            </option>
            <option value="Design und Kunst">Design und Kunst</option>
            <option value="School of Education">School of Education</option>
          </select>

          <label for="fachbereich">Fachbereich</label>
          <input
            type="text"
            id="fachbereich"
            name="fachbereich"
            placeholder="Fachbereich"
          />

          <label for="semester">Semester</label>
          <select id="semester" name="semester">
            <option value="">Bitte Semester auswählen</option>
            <option value="1-2">1. - 2. Semester</option>
            <option value="3-4">3. - 4. Semester</option>
            <option value="5-6">5. - 6. Semester</option>
            <option value="7 oder mehr">7. Semester oder höher</option>
          </select>

          <label for="editor">Über mich</label>
          <div id="editor"></div>

          <button type="submit" class="save-btn" id="submitBtn" disabled>
            Profil speichern
          </button>
        </form>
      </section>

      <aside class="profile-progress">
        <h3>Dein Profil vervollständigen</h3>

        <ul>
          <li id="check-photo">➖ Profilbild optional</li>
          <li id="check-fullname">➖ Vor- Nachname eingeben</li>
          <li id="check-email">➖ Universitäts Email eingeben</li>
          <li id="check-password">➖ Passwort eingeben</li>
          <li id="check-confirm-password">➖ Passwort bestätigen</li>
          <li id="check-faculty">➖ Fakultät eintragen</li>
          <li id="check-fachbereich">➖ Fachbereich eintragen</li>
          <li id="check-semester">➖ Semester hinzufügen</li>
          <li id="check-about">➖ Beschreibung hinzufügen</li>
        </ul>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
    <script type="module" src="signup.js"></script>
  </body>
</html>
