<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Registrierung - BUW</title>

    <link rel="stylesheet" href="signup.css" />
  </head>

  <body>
    <header>
      <div class="logo">BUW</div>

      <button
        type="button"
        class="login-btn"
        onclick="window.location.href = '../Login/login.html'"
      >
        Anmelden
      </button>
    </header>

    <main class="signup-page">
      <section class="signup-card">
        <h1>Konto erstellen</h1>

        <p class="intro-text">
          Erstelle dein Konto schnell. Dein Profil kannst du danach vervollständigen.
        </p>

        <form id="registrationForm">
          <label for="fullname">Full Name</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Vor- Nachname"
          />

          <label for="email">University Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="beispiel@uni-wuppertal.de"
          />

          <label for="password">Passwort</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Mindestens 6 Zeichen"
          />

          <label for="confirmPassword">Passwort bestätigen</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Passwort erneut eingeben"
          />

          <button type="submit" class="save-btn" id="submitBtn" disabled>
            Konto erstellen
          </button>
        </form>

        <div class="signup-checks">
          <p id="check-fullname">➖ Vor- Nachname eingeben</p>
          <p id="check-email">➖ Universitäts Email eingeben</p>
          <p id="check-password">➖ Passwort eingeben</p>
          <p id="check-confirm-password">➖ Passwort bestätigen</p>
        </div>
      </section>
    </main>

    <script type="module" src="signup.js"></script>
  </body>
</html>
